name: Lambda Package

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: ashsa-lambda-x86_64
            zip_suffix: x86_64
          - target: aarch64-unknown-linux-musl
            artifact_name: ashsa-lambda-arm64
            zip_suffix: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@f13886b937689c021905a6b90929199931d60db1 # v2.8.1

      - name: Install cargo-lambda
        run: cargo install cargo-lambda --version 1.9.1 --locked

      - name: Build Lambda zip
        run: cargo lambda build --release --output-format zip --target ${{ matrix.target }}

      - name: Prepare named Lambda zip
        env:
          ZIP_NAME: ashsa-lambda-${{ matrix.zip_suffix }}.zip
        run: cp target/lambda/ashsa/bootstrap.zip "$ZIP_NAME"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact_name }}
          path: ashsa-lambda-${{ matrix.zip_suffix }}.zip
          if-no-files-found: error

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Lambda artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          files: dist/*.zip
