name: Lambda Package

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: ashsa-lambda-x86_64
            zip_suffix: x86_64
          - target: aarch64-unknown-linux-musl
            artifact_name: ashsa-lambda-arm64
            zip_suffix: arm64
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Verify Zig installation
        run: zig version

      - name: Install cargo-lambda
        run: cargo install cargo-lambda --version 1.9.1 --locked

      - name: Build Lambda zip
        run: cargo lambda build --release --output-format zip --target ${{ matrix.target }}

      - name: Prepare named Lambda zip
        env:
          ZIP_NAME: ashsa-lambda-${{ matrix.zip_suffix }}.zip
        run: cp target/lambda/ashsa/bootstrap.zip "$ZIP_NAME"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: ashsa-lambda-${{ matrix.zip_suffix }}.zip
          if-no-files-found: error
