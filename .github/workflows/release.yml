name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release:
    name: Release unpublished crate
    runs-on: ubuntu-latest
    outputs:
      releases: ${{ steps.release_plz.outputs.releases }}
      releases_created: ${{ steps.release_plz.outputs.releases_created }}
    permissions:
      contents: write
      id-token: write
      pull-requests: read
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release
        id: release_plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release-pr:
    name: Create or update release PR
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Run release-plz release-pr
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
          version: 0.3.158
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lambda-package:
    name: Build Lambda release artifacts
    needs: release
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            artifact_name: ashsa-lambda-x86_64
            zip_suffix: x86_64
          - target: aarch64-unknown-linux-musl
            artifact_name: ashsa-lambda-arm64
            zip_suffix: arm64
    permissions:
      contents: read
      attestations: write
      artifact-metadata: write
      id-token: write
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2.2.1
        with:
          version: 0.16.0

      - name: Verify Zig installation
        run: zig version

      - name: Install cargo-lambda
        run: cargo install cargo-lambda --version 1.9.1 --locked

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --version 0.5.9 --locked

      - name: Build Lambda zip
        run: cargo lambda build --release --output-format zip --target ${{ matrix.target }}

      - name: Prepare Lambda assets
        env:
          ZIP_NAME: ashsa-lambda-${{ matrix.zip_suffix }}.zip
          SBOM_BASE_NAME: ashsa-lambda-${{ matrix.zip_suffix }}.cdx
        run: |
          cp target/lambda/ashsa/bootstrap.zip "$ZIP_NAME"
          cargo cyclonedx --format json --target ${{ matrix.target }} --override-filename "$SBOM_BASE_NAME"
          test -f "$SBOM_BASE_NAME.json"

      - name: Attest Lambda provenance
        id: attest_provenance
        uses: actions/attest@59d8942ac46f204658d82af2d51679c08f6b95f4 # v4.1.0
        with:
          subject-path: ashsa-lambda-${{ matrix.zip_suffix }}.zip

      - name: Attest Lambda SBOM
        id: attest_sbom
        uses: actions/attest@59d8942ac46f204658d82af2d51679c08f6b95f4 # v4.1.0
        with:
          subject-path: ashsa-lambda-${{ matrix.zip_suffix }}.zip
          sbom-path: ashsa-lambda-${{ matrix.zip_suffix }}.cdx.json

      - name: Report attestation URLs
        run: |
          echo "Provenance attestation: ${{ steps.attest_provenance.outputs.attestation-url }}"
          echo "SBOM attestation: ${{ steps.attest_sbom.outputs.attestation-url }}"

      - name: Upload Lambda artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ashsa-lambda-${{ matrix.zip_suffix }}.zip
            ashsa-lambda-${{ matrix.zip_suffix }}.cdx.json
          if-no-files-found: error

  attach-lambda-assets:
    name: Attach Lambda assets to GitHub release
    needs:
      - release
      - lambda-package
    if: needs.release.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download Lambda artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Upload release assets
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ fromJSON(needs.release.outputs.releases)[0].tag }}
          files: |
            dist/*.zip
            dist/*.cdx.json
